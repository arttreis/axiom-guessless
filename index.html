<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axiom — Geração de Conteúdo com IA</title>
    <meta name="description" content="Descubra o arquétipo da sua marca e gere conteúdo autêntico para redes sociais com inteligência artificial." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script>
      (function(){
        try {
          var t = localStorage.getItem('axiom-theme');
          if (t === 'light') document.documentElement.setAttribute('data-theme','light');
        } catch(e){}
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
